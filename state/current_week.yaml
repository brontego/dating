week:
  start_date: 2026-04-20
  focus: travel_week_survival_keep_dating_bounded_and_optional_while_preserving_the_new_copilot_and_flirty_practice_lanes
  status: travel_week_survival

profile_reboot:
  current_stage: usable_now_plus_ai_context_buildout
  minimum_viable_session_minutes: 10
  stretch_session_minutes: 15_to_25

priority_outcomes:
  - keep_dating_optional_during_travel_week_instead_of_turning_it_into_another_required_lane
  - preserve_the_chatgpt_project_and_flirty_practice_setup_without_forcing_output
  - use_any_hinge_time_as_a_bounded_action_block_not_a_background_checking_loop
  - avoid_using_travel_stress_or_anna_disappointment_as_a_reason_for_rebound_swiping

cadence:
  minimum_viable:
    - treat_the_anna_lane_as_likely_closed_unless_a_new_clear_signal_appears
    - no_required_app_block_during_travel
    - if_an_app_block_happens_keep_it_to_10_to_15_minutes_and_one_real_action
    - keep_app_use_attached_to_real_actions
  stretch:
    - one_short_flirty_practice_block_if_it_feels_fun_and_grounding
    - one_quality_like_or_opener_only_if_the_queue_is_actually_good

guardrails:
  - no_checking_without_taking_a_real_action
  - no_endless_checking_loops
  - no_chasing_anna_after_the_followup_lane_collapsed
  - no_rebound_swiping_or_mass_liking_to_numb_the_hit
  - no_turning_ai_into_a_generic_pickup_artist_machine
  - no_spending_spiral_because_one_promising_lane_hurt_or_because_the_coffee_table_is_already_ordered
  - no_perfect_profile_before_first_use
  - no_low_quality_likes_just_to_protect_the_streak
  - no_forcing_high_volume_if_the_system_starts_feeling_heavy
  - no_turning_flirty_practice_into_pickup_artist_roleplay_or_rehearsed_weirdness

flirty_practice:
  status: active_but_optional_during_travel_week
  aim: build_light_playful_energy_and_banter_capacity_without_losing_your_actual_voice
  cadence:
    minimum_viable: 1_small_block_per_week_when_capacity_exists
    good_target: about_1_to_2_blocks_per_week_not_daily_drilling
  allowed_inputs:
    - short_youtube_clip_or_other_dating_communication_content_for_signal_gathering
    - https_colon_slash_slash_charismaoncommand_university_slash
    - chatgpt_line_reps_and_rewrites
  practice_formats:
    - study_one_small_idea_then_write_3_to_5_lines_in_your_own_voice
    - say_a_few_lines_out_loud_so_you_can_hear_if_they_sound_like_you
    - use_chatgpt_to_rewrite_try_hard_lines_into_warmer_more_human_versions
  success_rule: more_comfort_with_light_playfulness_not_a_finished_script_bank

live_checkins:
  - date: 2026-04-20
    anna_thread_status: still_closed
    quality_likes_sent: not_required
    note: travel_week_is_survival_mode_so_dating_and_flirty_practice_are_optional_support_lanes_not_required_progress
  - date: 2026-04-12
    anna_thread_status: first_date_went_well_and_that_part_should_still_count_even_though_it_did_not_turn_into_stable_momentum
    quality_likes_sent: pending
    note: the_good_date_result_was_real_and_it_is_still_worth_remembering_even_if_the_followup_did_not_hold
  - date: 2026-04-14
    anna_thread_status: followup_lane_collapsed_after_the_good_first_date_so_the_job_is_now_to_move_on_cleanly_without_chasing
    quality_likes_sent: pending
    note: use_the_setback_to_build_a_lower_friction_higher_quality_dating_workflow_instead_of_treating_it_as_proof_that_the_system_failed
  - date: 2026-04-16
